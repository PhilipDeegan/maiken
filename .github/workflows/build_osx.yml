name: macos-latest

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - run: ./res/ci/nixish_setup.sh && make bsd

    - env:
        MKN_LIB_LINK_LIB: 1
      run: |
        mkdir -p ~/.maiken/app/mkn
        cp -r $PWD ~/.maiken/app/mkn/master
        KLOG=3 ./mkn build -dtKO 2 -W 9 -g 0 -x res/mkn/clang
        KLOG=3 ./mkn build -dtOp test_mod -x res/mkn/clang
        KLOG=3 ./mkn build test pack -Op test -x res/mkn/clang
        KLOG=3 ./mkn -p lib_test -x res/mkn/clang
